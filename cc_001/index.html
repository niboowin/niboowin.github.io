<!DOCTYPE html>
<html>

	<head>
		<meta http-equiv="Content-type" content="text/html; charset=utf-8">
		<title>GRIP dev challenge 001</title>
		<style media="screen">
			body{
				text-align: center;
				margin: 0 auto;
				max-width: 1024px;
				padding: 0;
				background-color: #111;
			}
			ul{
				margin: 0;
				padding: 20px 0;
				list-style: none;
			}
			li {
				margin: 30px;
			}
			input[type=range] {
				-webkit-appearance: none;
				margin: 10px 0;
				width: 100%;
			}
			input[type=range]:focus {
				outline: none;
			}
			input[type=range]::-webkit-slider-runnable-track {
				width: 100%;
				height: 12px;
				cursor: pointer;
				animate: 0.2s;
				box-shadow: 0;
				background: #000;
				border-radius: 0;
				border:1px solid #666;
			}
			input[type=range]::-webkit-slider-thumb {
				box-shadow:0
				border: 0;
				height: 11px;
				width: 20px;
				border-radius: 0;
				background: #999;
				cursor: pointer;
				-webkit-appearance: none;
				margin-top: 0;
			}

			label{
				float: left;
				color: white;
				font-size: 18px;
			}
		</style>
	</head>

	<body bgColor=#EFEFEF>
		<canvas id="mainCanvas", width="1024", height="600" background="#FFFFFF">Canvas fail!</canvas>

		<ul>
			<li>
				<label>Tesselation</label>
				<input type="range" min="3" max="12" value="3" onchange="demoApp.updateTesselation(this)">
			</li>
			<li>
				<label>Item Count</label>
				<input type="range" min="1" max="200" value="10" onchange="demoApp.updateCount(this)">
			</li>
			<li>
				<button type="button" onclick="demoApp.toggleDemo(this)">Toggle Demo</button></li>
		</ul>

		<script type="text/javascript" src="utils.js"></script>
		<script type="text/javascript" src="polygon.js"></script>
		<script type="text/javascript" src="demo.js"></script>
		<script type="text/javascript" src="main.js"></script>
	</body>

</html>
